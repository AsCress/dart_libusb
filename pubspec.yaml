name: dart_libusb
description: A fork of the libusb Dart package with updated dependencies. Provides Dart FFI bindings for the libusb native library on Linux, macOS, and Windows.
version: 1.0.0
homepage: https://github.com/AsCress/dart_libusb
issue_tracker: https://github.com/AsCress/dart_libusb/issues

topics:
  - usb
  - ffi
  - hardware
  - libusb

environment:
  flutter: '3.41.7'
  sdk: ^3.11.0

platforms:
  linux:
  macos:
  windows:

dependencies:
  ffi: ^2.2.0

dev_dependencies:
  ffigen: ^20.1.1
  test: ^1.16.3
  convert: ^3.0.0

ffigen:
  name: Libusb
  description: Bindings to `libusb.h`.
  output: 'lib/src/libusb.ffigen.dart'
  headers:
    entry-points:
      - 'libusb-1.0/libusb.h'
    include-directives:
      - '**libusb.h'
  library-imports:
    pkg_libusb: 'package:dart_libusb/src/libusb_base.dart'
  type-map:
    'typedefs':
      'ssize_t':
        'lib': 'pkg_libusb'
        'c-type': 'Ssize'
        'dart-type': 'int'
    'structs':
      'timeval':
        'lib': 'pkg_libusb'
        'c-type': 'Timeval'
        'dart-type': 'Timeval'